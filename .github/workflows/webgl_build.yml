name: Build

on:
  # masterへのPRマージをトリガーとしてワークフローを開始する
  pull_request:
    branches:
      - develop
      - main
    types: [closed]

  # 手動実行デバッグ用
  workflow_dispatch: {}

jobs:
  build:
    name: Build my project
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache
      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**','ProjectSettings/**') }}
          restore-keys: Library-

      # Build
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: 6000.0.47f1 # ここは各自プロジェクトに合わせて設定

      # Remove
      - name: Remove symlinks and macOS hidden files
        run: |
          find build -type l -delete || true
          find build -name ".DS_Store" -delete || true

      # Check build size
      - name: Check build size
        run: du -sh build
          
      # Upload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: build
          
      - name: Notify Discord - Success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ Build Success! 🎉\nView logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      # Send a failure notification to Discord  
      - name: Notify Discord - Failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "Build Failed! 😞 \nThe WebGL build has failed. Please check the logs for more details."}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
